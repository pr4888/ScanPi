# ScanPi SDR profile — HackRF One :: Marine VHF (156-162 MHz)
#
# FCC / ITU-R M.493 / M.1371 allocation context (US):
#   156-162 MHz  marine VHF — 25 kHz channels, NFM, max deviation 5 kHz
#   156.525 MHz  Channel 70 — DSC (digital selective calling, no voice)
#   156.800 MHz  Channel 16 — international distress / hail
#   157.100 MHz  Channel 22A — USCG Liaison (working channel after 16)
#   162.400-162.550 MHz — NOAA weather radio (WX1-WX7) sub-channels
#
# Span: 156.05 MHz (Ch 60 / port ops) to 162.55 MHz (NOAA WX7) ~= 6.5 MHz.
# Center 159 MHz, 8 Msps -> [155, 163] MHz window covers all of it cleanly.
#
# Notes:
#   - All marine channels are NFM with 750 us de-emphasis per ITU-R M.489-2
#     (different from US land mobile NFM 75 us). Set deemph_us = 750.
#   - DSC ch 70 carries 1200 baud GMSK data. NFM demod will produce the GMSK
#     sound; pipe the WAV to a DSC decoder offline. Tagged demod=nfm here so
#     activity still triggers a recording.

[sdr]
id          = "hackrf_marine_vhf"
driver      = "hackrf"
serial      = ""
center_hz   = 159_000_000
sample_rate = 8_000_000
gain        = "lna=24,vga=20,amp=0"
front_end   = "VHF marine 156-162 MHz BPF / SAW"

[channelizer]
type            = "pfb"
num_chans       = 32
attenuation_db  = 80.0
taps_window     = "blackman-harris"
transition_frac = 0.20

# ---- Distress / hail / safety ----
[[channels]]
name       = "MAR-16"
freq_hz    = 156_800_000
demod      = "nfm"
bw_hz      = 16_000
squelch_db = -28.0
deemph_us  = 750.0
notes      = "International distress + hailing (priority)"

[[channels]]
name       = "MAR-22A"
freq_hz    = 157_100_000
demod      = "nfm"
bw_hz      = 16_000
squelch_db = -28.0
deemph_us  = 750.0
notes      = "USCG Liaison — working channel after 16"

[[channels]]
name       = "MAR-DSC-70"
