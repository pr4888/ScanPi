# ScanPi SDR profile — HackRF One :: VHF analog public safety (CT, New London County)
#
# Per Heimdall keepers.md known-active analog public safety on VHF in
# Groton/New London CT (CSP itself is P25 digital and is NOT covered here):
#
#   151.295 MHz  GROTON_FIRE     (dispatch, confirmed active)
#   154.0625    ELYME_FIRE      (East Lyme)
#   155.775     STON_FIRE       (Stonington)
#   154.265     INTCITY_FA      (statewide mutual-aid intercity fireground)
#
# Plus the common VHF-hi public-service slots that may be in use seasonally
# (USFS / NPS / state, MURS, common itinerant). Span 151.295 -> 156.150 MHz
# (~4.9 MHz). Center 153.5 MHz, 8 Msps -> [149.5, 157.5] MHz window covers all
# of it (with margin) — does NOT cover marine VHF (use hackrf_marine_vhf for that).
#
# Source: RadioReference / Broadcastify, frequency catalog in
#   .claude/rules/keepers.md ("Fire/Police freqs (Groton CT)").

[sdr]
id          = "hackrf_vhf_public_safety"
driver      = "hackrf"
serial      = ""
center_hz   = 153_500_000
sample_rate = 8_000_000
gain        = "lna=24,vga=20,amp=0"
front_end   = "VHF-hi 150-160 MHz BPF / SAW"

[channelizer]
type            = "pfb"
num_chans       = 32
attenuation_db  = 80.0
taps_window     = "blackman-harris"
transition_frac = 0.20

# ---- Confirmed active fire / EMS analog ----
[[channels]]
name       = "GROTON_FIRE"
freq_hz    = 151_295_000
demod      = "nfm"
bw_hz      = 12_500
squelch_db = -25.0
deemph_us  = 75.0
notes      = "Groton (CT) fire dispatch — confirmed active analog"

