# ScanPi SDR profile — HackRF One :: UHF business pool overview (460-468 MHz)
#
# FCC allocation context (Part 90 industrial / business pool):
#   460-470 MHz   UHF business pool (mobile + repeater pairs, 5 MHz offset)
#   460.000-460.650   Police (some legacy assignments still active)
#   460.650-462.500   Business / industrial
#   462.500-462.7375  GMRS — covered by hackrf_gmrs_frs.toml, NOT here
#   463.000-466.475   Business / industrial
#   467.500-467.7125  FRS — covered by hackrf_gmrs_frs.toml, NOT here
#   467.750-468.5375  Itinerant business
#   469.500-470.000   Business
#
# Span: 460.0 -> 468.0 = 8 MHz exactly. Center at 464 MHz, 8 Msps -> [460, 468]
# fits the lower 8 MHz of the band cleanly. The upper sliver 468-470 MHz is
# OUTSIDE this profile's window — to cover it, retune to center 466 MHz.
#
# These are *survey* channels: the UHF business pool is shared, license-by-coordination,
# and tends to vary by region. Keep these as a wide net to discover what's active in
# your area, then promote interesting hits to a dedicated profile.

[sdr]
id          = "hackrf_uhf_business"
driver      = "hackrf"
serial      = ""
center_hz   = 464_000_000
sample_rate = 8_000_000
gain        = "lna=24,vga=20,amp=0"
front_end   = "UHF 450-470 MHz BPF / SAW"

[channelizer]
type            = "pfb"
num_chans       = 32
attenuation_db  = 80.0
taps_window     = "blackman-harris"
transition_frac = 0.20

