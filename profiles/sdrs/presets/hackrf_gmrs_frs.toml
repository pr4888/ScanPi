# ScanPi SDR profile — HackRF One :: GMRS + FRS (full 22-channel coverage)
#
# FCC allocation context:
#   GMRS (Part 95E): 462.5500-462.7250 MHz (channels 15-22 = main + repeater outputs)
#                    467.5500-467.7250 MHz (repeater inputs, paired with 15-22)
#                    462.5625-462.7125 MHz (channels 1-7, FRS-shared, 5W)
#   FRS  (Part 95B): 462.5625-462.7125 MHz (channels 1-7,  shared with GMRS, 2W FRS)
#                    467.5625-467.7125 MHz (channels 8-14, FRS-only,         0.5W)
#
# This profile covers the entire 22-channel FRS+GMRS plan plus the GMRS repeater
# inputs (467.55-467.7375), in one HackRF tune. Wide-coverage scan-the-whole-block
# preset; subset the [[channels]] list on a Pi 5 to fit your CPU budget.
#
# Span check: 462.5500 -> 467.7375 = 5.1875 MHz center 465.14 MHz; we sit center
# at 465 MHz with 8 Msps -> [461, 469] MHz window comfortably wraps both blocks.

[sdr]
id          = "hackrf_gmrs_frs"
driver      = "hackrf"
serial      = ""
center_hz   = 465_000_000
sample_rate = 8_000_000
gain        = "lna=24,vga=20,amp=0"
front_end   = "UHF 400-500 MHz BPF / SAW"

[channelizer]
type            = "pfb"
num_chans       = 32
attenuation_db  = 80.0
taps_window     = "blackman-harris"
transition_frac = 0.20

# ===== GMRS channels 15-22 (main, 50W) — 462.5500-462.7250, 25 kHz spacing =====
[[channels]]
name       = "GMRS-15"
freq_hz    = 462_550_000
demod      = "nfm"
bw_hz      = 12_500
squelch_db = -25.0
deemph_us  = 75.0
notes      = "GMRS main 15 (50W max)"

