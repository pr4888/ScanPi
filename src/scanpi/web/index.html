<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScanPi</title>
<style>
:root {
  --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #242424;
  --text: #e0e0e0; --text2: #888; --text3: #555;
  --accent: #1db954; --accent2: #1ed760;
  --police: #4a9eff; --fire: #ff4a4a; --ems: #ff8c1a; --utility: #b44aff; --other: #666;
  --border: #282828; --hover: #2a2a2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; padding-bottom: 90px; }

/* Sidebar + Main layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); padding: 16px; flex-shrink: 0; border-right: 1px solid var(--border); position: fixed; height: calc(100vh - 80px); overflow-y: auto; }
.main { flex: 1; margin-left: 240px; padding: 24px; }
@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }

/* Sidebar */
.sidebar .logo { font-size: 22px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.5px; }
.sidebar .logo span { color: var(--accent); }
.sidebar h4 { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 500; transition: all 0.15s; }
.nav-item:hover { color: var(--text); background: var(--hover); }
.nav-item.active { color: var(--text); background: var(--bg3); }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; }

/* Category filters in sidebar */
.cat-filter { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); }
.cat-filter:hover { background: var(--hover); color: var(--text); }
.cat-filter.active { color: var(--text); }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; }
.cat-count { margin-left: auto; font-size: 11px; color: var(--text3); }

/* Talkgroup cards */
.tg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.tg-card { background: var(--bg3); border-radius: 8px; padding: 16px; cursor: pointer; transition: background 0.2s, transform 0.1s; position: relative; overflow: hidden; }
.tg-card:hover { background: var(--bg4); transform: translateY(-2px); }
.tg-card.active-call { box-shadow: 0 0 0 2px var(--accent); }
.tg-card .icon { font-size: 32px; margin-bottom: 8px; }
.tg-card .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tg-card .meta { font-size: 12px; color: var(--text2); }
.tg-card .calls { font-size: 11px; color: var(--text3); margin-top: 6px; }
.tg-card .live-dot { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.tg-card .cat-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }

/* Call list (tracks) */
.call-list { display: flex; flex-direction: column; }
.call-row { display: grid; grid-template-columns: 24px 40px 1fr 100px 60px 30px 30px; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.star-btn { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 2px; }
.star-btn:hover { color: #fbbf24; } .star-btn.starred { color: #fbbf24; }
.call-row:hover { background: var(--hover); }
.call-row.playing { background: var(--bg3); }
.call-row .num { color: var(--text3); font-size: 12px; text-align: right; }
.call-row .tg-icon { font-size: 16px; }
.call-row .info { overflow: hidden; }
.call-row .info .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.call-row .info .sub { font-size: 11px; color: var(--text2); }
.call-row .time { color: var(--text2); font-size: 12px; text-align: right; }
.call-row .dur { color: var(--text2); font-size: 12px; text-align: right; }
.call-row .play-btn { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 4px; border-radius: 50%; }
.call-row .play-btn:hover { color: var(--accent); background: var(--bg4); }

/* Now Playing bar */
.now-playing { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 50; }
.now-playing .info { flex: 1; min-width: 0; }
.now-playing .info .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-playing .info .sub { font-size: 12px; color: var(--text2); }
.now-playing .controls { display: flex; align-items: center; gap: 16px; }
.now-playing .controls button { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
.now-playing .controls button:hover { background: var(--bg3); }
.now-playing .controls .play-main { background: var(--accent); color: black; font-size: 18px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.now-playing .controls .play-main:hover { background: var(--accent2); transform: scale(1.05); }
.now-playing audio { display: none; }
.np-progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--bg3); }
.np-progress-bar { height: 100%; background: var(--accent); transition: width 0.5s linear; }

/* Page headers */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 28px; font-weight: 800; }
.page-header p { color: var(--text2); margin-top: 4px; }

/* Section headers */
.section-header { display: flex; justify-content: space-between; align-items: center; margin: 24px 0 12px; }
.section-header h2 { font-size: 20px; font-weight: 700; }
.section-header a { color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.section-header a:hover { color: var(--text); }

/* Search bar */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px 10px 38px; color: var(--text); font-size: 14px; }
.search-wrap input:focus { outline: none; border-color: var(--text3); }
.search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; }

/* Active calls banner */
.active-banner { background: linear-gradient(135deg, #1a3a1a 0%, #0a1a0a 100%); border: 1px solid #2a4a2a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.active-banner .pulse { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
.active-banner .text { font-size: 13px; }
.active-banner .text strong { color: var(--accent); }

/* Transcript bubble */
.transcript { background: var(--bg3); border-radius: 8px; padding: 10px 14px; margin: 4px 0; font-size: 13px; color: var(--text2); line-height: 1.5; border-left: 3px solid var(--accent); }

/* Empty state */
.empty { text-align: center; padding: 40px; color: var(--text3); }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* TG detail view */
.tg-detail-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 24px; }
.tg-detail-header .icon { font-size: 64px; background: var(--bg3); border-radius: 8px; padding: 16px; }
.tg-detail-header .info h1 { font-size: 32px; font-weight: 800; }
.tg-detail-header .info .meta { color: var(--text2); margin-top: 4px; }
.tg-detail-header .info .stats { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: var(--text2); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: black; font-weight: 600; border: none; border-radius: 20px; padding: 8px 24px; cursor: pointer; font-size: 14px; }
.btn:hover { background: var(--accent2); transform: scale(1.02); }
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Scan<span>Pi</span></div>

  <div class="nav-item active" onclick="showView('home')"><span class="icon">&#127968;</span> Home</div>
  <div class="nav-item" onclick="showView('recent')"><span class="icon">&#128340;</span> Recent Calls</div>
  <div class="nav-item" onclick="showView('search')"><span class="icon">&#128269;</span> Search</div>
  <div class="nav-item" onclick="showView('saved')"><span class="icon">&#9733;</span> Saved</div>

  <h4>Departments</h4>
  <div id="sidebar-cats"></div>

  <h4 style="margin-top:20px">Status</h4>
  <div style="font-size:12px;color:var(--text3);padding:4px 12px" id="sidebar-status">Loading...</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HOME VIEW -->
  <div id="view-home">
    <div id="active-banner" style="display:none"></div>

    <div class="section-header">
      <h2>Active Now</h2>
    </div>
    <div id="active-tgs" class="tg-grid" style="margin-bottom:24px"></div>

    <div class="section-header">
      <h2>All Departments</h2>
      <a onclick="showView('recent')">See all calls &#8594;</a>
    </div>
    <div id="all-tgs" class="tg-grid"></div>
  </div>

  <!-- RECENT CALLS VIEW -->
  <div id="view-recent" style="display:none">
    <div class="page-header">
      <h1>Recent Calls</h1>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <div style="display:flex;border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:12px">
          <span onclick="recentSort='newest';refreshRecent()" id="rs-newest" style="padding:6px 12px;cursor:pointer">Newest First</span>
          <span onclick="recentSort='oldest';refreshRecent()" id="rs-oldest" style="padding:6px 12px;cursor:pointer">Oldest First</span>
        </div>
        <button class="btn" onclick="if(playQueue.length)playCall(0)" style="font-size:12px;padding:6px 16px">&#9654; Play All</button>
      </div>
    </div>
    <div id="recent-calls" class="call-list"></div>
  </div>

  <!-- SAVED VIEW -->
  <div id="view-saved" style="display:none">
    <div class="page-header"><h1>Saved Calls</h1><p>Calls you starred</p></div>
    <div id="saved-calls" class="call-list"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div id="view-search" style="display:none">
    <div class="page-header"><h1>Search</h1><p>Search transcripts and departments</p></div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search calls, departments, transcripts..." oninput="debounceSearch()">
    </div>
    <div id="search-results" class="call-list"></div>
  </div>

  <!-- TALKGROUP DETAIL VIEW -->
  <div id="view-tgdetail" style="display:none">
    <div id="tg-detail-content"></div>
  </div>

</div><!-- /main -->
</div><!-- /app -->

<!-- NOW PLAYING BAR -->
<div class="now-playing" id="now-playing">
  <div class="np-progress"><div class="np-progress-bar" id="np-bar"></div></div>
  <div style="font-size:28px" id="np-icon">&#128251;</div>
  <div class="info">
    <div class="name" id="np-name">ScanPi</div>
    <div class="sub" id="np-sub">Select a call to play</div>
  </div>
  <div class="controls">
    <button onclick="playPrev()" title="Previous">&#9198;</button>
    <button class="play-main" onclick="togglePlay()" id="np-play">&#9654;</button>
    <button onclick="playNext()" title="Next">&#9197;</button>
  </div>
  <audio id="audio-player" onended="playNext()" ontimeupdate="updateProgress()"></audio>
</div>

<script>
// --- State ---
let currentView = 'home';
let talkgroups = [];
let recentCalls = [];
let activeCalls = [];
let currentCallIndex = -1;
let playQueue = [];
let filterCategory = null;
let searchTimeout = null;

// --- API ---
async function api(path) {
  try { const r = await fetch('/api/' + path); return r.ok ? await r.json() : null; }
  catch(e) { return null; }
}

// --- Views ---
function showView(name, data) {
  currentView = name;
  ['home','recent','saved','search','tgdetail'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[onclick*="${name}"]`);
  if (nav) nav.classList.add('active');
  if (name === 'home') refreshHome();
  else if (name === 'recent') refreshRecent();
  else if (name === 'saved') refreshSaved();
  else if (name === 'tgdetail') showTgDetail(data);
}

// --- Home ---
async function refreshHome() {
  const [tgData, activeData, statusData] = await Promise.all([
    api('talkgroups'), api('calls/active'), api('status')
  ]);

  if (tgData) talkgroups = tgData.talkgroups;
  if (activeData) activeCalls = activeData.calls;
  if (statusData) {
    document.getElementById('sidebar-status').innerHTML =
      `<div>&#128225; ${statusData.total_recordings || 0} recordings</div>` +
      `<div>&#128190; ${((statusData.storage?.recordings_size_gb||0)*1024).toFixed(0)} MB</div>`;
  }

  // Active calls banner
  const banner = document.getElementById('active-banner');
  if (activeCalls.length > 0) {
    banner.style.display = 'flex';
    banner.innerHTML = `<div class="pulse"></div><div class="text"><strong>${activeCalls.length} active</strong> — ${activeCalls.map(c => c.name).join(', ')}</div>`;
  } else {
    banner.style.display = 'none';
  }

  // Active talkgroup cards
  const activeTgIds = new Set(activeCalls.map(c => c.tgid));
  const activeHtml = talkgroups
    .filter(tg => activeTgIds.has(tg.tgid) || (tg.last_call && Date.now()/1000 - tg.last_call < 300))
    .slice(0, 8)
    .map(tg => tgCard(tg, activeTgIds.has(tg.tgid)))
    .join('');
  document.getElementById('active-tgs').innerHTML = activeHtml || '<div class="empty"><p>No active calls right now</p></div>';

  // All talkgroups
  let filtered = talkgroups;
  if (filterCategory) filtered = filtered.filter(tg => tg.tg_category === filterCategory);
  document.getElementById('all-tgs').innerHTML = filtered.map(tg => tgCard(tg, activeTgIds.has(tg.tgid))).join('')
    || '<div class="empty"><div class="icon">&#128251;</div><p>Waiting for OP25 calls...</p></div>';

  // Sidebar categories
  const cats = {};
  talkgroups.forEach(tg => {
    const cat = tg.tg_category || 'other';
    cats[cat] = (cats[cat] || 0) + 1;
  });
  document.getElementById('sidebar-cats').innerHTML = Object.entries(cats)
    .sort((a,b) => b[1] - a[1])
    .map(([cat, count]) => `
      <div class="cat-filter ${filterCategory === cat ? 'active' : ''}" onclick="toggleCatFilter('${cat}')">
        <div class="cat-dot" style="background:var(--${cat})"></div>
        ${cat.charAt(0).toUpperCase() + cat.slice(1)}
        <span class="cat-count">${count}</span>
      </div>
    `).join('');
}

function tgCard(tg, isActive) {
  const cat = tg.tg_category || 'other';
  const icon = tg.icon || '&#128251;';
  const ago = tg.last_call ? timeAgo(tg.last_call) : 'no calls';
  return `
    <div class="tg-card ${isActive ? 'active-call' : ''}" onclick="showView('tgdetail', ${tg.tgid})">
      ${isActive ? '<div class="live-dot"></div>' : ''}
      <div class="icon">${icon}</div>
      <div class="name">${tg.tg_name}</div>
      <div class="meta">TG ${tg.tgid}</div>
      <div class="calls">${tg.call_count} calls &middot; ${ago}</div>
      <div class="cat-bar" style="background:var(--${cat})"></div>
    </div>
  `;
}

function toggleCatFilter(cat) {
  filterCategory = filterCategory === cat ? null : cat;
  refreshHome();
}

// --- Talkgroup Detail ---
let tgSortOrder = 'oldest'; // 'oldest' = chronological (play order), 'newest' = browse order

async function showTgDetail(tgid) {
  const tg = talkgroups.find(t => t.tgid === tgid) || { tgid, tg_name: `TG ${tgid}`, tg_category: 'other', icon: '&#128251;' };
  const callsData = await api(`calls?tgid=${tgid}&limit=200`);
  let calls = callsData ? callsData.calls : [];

  // Default: oldest first (chronological — like listening to a conversation)
  if (tgSortOrder === 'oldest') calls = calls.slice().reverse();
  playQueue = calls;

  const cat = tg.tg_category || 'other';
  document.getElementById('tg-detail-content').innerHTML = `
    <div class="tg-detail-header">
      <div class="icon">${tg.icon || '&#128251;'}</div>
      <div class="info">
        <h1>${tg.tg_name}</h1>
        <div class="meta">${cat.charAt(0).toUpperCase() + cat.slice(1)} &middot; TG ${tg.tgid}</div>
        <div class="stats">
          <span>${tg.call_count || 0} calls</span>
          <span>${tg.total_duration ? formatDuration(tg.total_duration) : '0s'} total</span>
          <span>Last: ${tg.last_call ? timeAgo(tg.last_call) : 'never'}</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
      <button class="btn" onclick="playAllTg()">&#9654; Play All</button>
      <div style="display:flex;border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:12px">
        <span onclick="tgSortOrder='oldest';showTgDetail(${tgid})" style="padding:6px 12px;cursor:pointer;${tgSortOrder==='oldest'?'background:var(--bg4);color:var(--text)':'color:var(--text3)'}">Oldest First</span>
        <span onclick="tgSortOrder='newest';showTgDetail(${tgid})" style="padding:6px 12px;cursor:pointer;${tgSortOrder==='newest'?'background:var(--bg4);color:var(--text)':'color:var(--text3)'}">Newest First</span>
      </div>
    </div>
    <div class="call-list">
      ${calls.length ? calls.map((c, i) => callRow(c, i)).join('') : '<div class="empty"><p>No calls recorded yet</p></div>'}
    </div>
  `;
}

// --- Recent Calls ---
let recentSort = 'newest';

async function refreshRecent() {
  const data = await api('calls?limit=100');
  if (!data) return;
  recentCalls = data.calls;
  if (recentSort === 'oldest') recentCalls = recentCalls.slice().reverse();
  playQueue = recentCalls;
  // Update sort toggle styling
  const nEl = document.getElementById('rs-newest');
  const oEl = document.getElementById('rs-oldest');
  if (nEl) { nEl.style.background = recentSort==='newest' ? 'var(--bg4)' : ''; nEl.style.color = recentSort==='newest' ? 'var(--text)' : 'var(--text3)'; }
  if (oEl) { oEl.style.background = recentSort==='oldest' ? 'var(--bg4)' : ''; oEl.style.color = recentSort==='oldest' ? 'var(--text)' : 'var(--text3)'; }
  document.getElementById('recent-calls').innerHTML = recentCalls.length
    ? recentCalls.map((c, i) => callRow(c, i)).join('')
    : '<div class="empty"><div class="icon">&#128340;</div><p>No calls yet. Make sure OP25 is running.</p></div>';
}

// --- Search ---
function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 300);
}
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
  const data = await api(`calls?limit=100&search=${encodeURIComponent(q)}`);
  if (!data) return;
  playQueue = data.calls;
  document.getElementById('search-results').innerHTML = data.calls.length
    ? data.calls.map((c, i) => callRow(c, i)).join('')
    : `<div class="empty"><p>No results for "${q}"</p></div>`;
}

// --- Call Row ---
let starredCalls = JSON.parse(localStorage.getItem('scanpi_starred') || '[]');

function callRow(call, index) {
  const cat = call.tg_category || 'other';
  const icon = {'police':'&#128308;','fire':'&#128308;','ems':'&#128992;'}[cat] || '&#9898;';
  const isStarred = starredCalls.includes(call.id);
  return `
    <div class="call-row ${currentCallIndex === index ? 'playing' : ''}" onclick="playCall(${index})">
      <span class="num">${index + 1}</span>
      <span class="tg-icon" style="color:var(--${cat})">${icon}</span>
      <div class="info">
        <div class="name">${call.tg_name || 'TG ' + call.tgid}</div>
        <div class="sub">${call.transcript || (call.radio_id ? 'RID ' + call.radio_id : '')}</div>
      </div>
      <span class="time">${call.start_time ? timeAgo(call.start_time) : ''}</span>
      <span class="dur">${call.duration_s ? call.duration_s.toFixed(1) + 's' : ''}</span>
      <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="event.stopPropagation(); toggleStar(${call.id})" title="Save">${isStarred ? '&#9733;' : '&#9734;'}</button>
      <button class="play-btn" onclick="event.stopPropagation(); playCall(${index})">&#9654;</button>
    </div>
  `;
}

function toggleStar(callId) {
  const idx = starredCalls.indexOf(callId);
  if (idx >= 0) starredCalls.splice(idx, 1);
  else starredCalls.push(callId);
  localStorage.setItem('scanpi_starred', JSON.stringify(starredCalls));
  // Re-render current view
  if (currentView === 'recent') refreshRecent();
  else if (currentView === 'saved') refreshSaved();
  else if (currentView === 'tgdetail') {
    // just toggle the star visually
    document.querySelectorAll('.star-btn').forEach(btn => {
      const id = parseInt(btn.getAttribute('onclick')?.match(/\d+/)?.[0]);
      if (id === callId) {
        btn.classList.toggle('starred');
        btn.innerHTML = btn.classList.contains('starred') ? '&#9733;' : '&#9734;';
      }
    });
  }
}

async function refreshSaved() {
  if (!starredCalls.length) {
    document.getElementById('saved-calls').innerHTML = '<div class="empty"><div class="icon">&#9734;</div><p>Star calls you want to keep. They\'ll appear here.</p></div>';
    return;
  }
  // Fetch all recent and filter to starred
  const data = await api('calls?limit=500');
  if (!data) return;
  const saved = data.calls.filter(c => starredCalls.includes(c.id));
  playQueue = saved;
  document.getElementById('saved-calls').innerHTML = saved.length
    ? saved.map((c, i) => callRow(c, i)).join('')
    : '<div class="empty"><p>Starred calls may have expired</p></div>';
}

// --- Audio Playback ---
function playCall(index) {
  if (index < 0 || index >= playQueue.length) return;
  currentCallIndex = index;
  const call = playQueue[index];
  const player = document.getElementById('audio-player');
  const cat = call.tg_category || 'other';

  document.getElementById('np-icon').style.color = `var(--${cat})`;
  document.getElementById('np-name').textContent = call.tg_name || `TG ${call.tgid}`;
  document.getElementById('np-sub').textContent = call.transcript || `${call.duration_s?.toFixed(1) || '?'}s • ${timeAgo(call.start_time)}`;

  if (call.filepath && call.id) {
    player.src = `/api/calls/${call.id}/audio`;
    player.play().catch(() => {});
    document.getElementById('np-play').innerHTML = '&#10074;&#10074;';
  }

  // Update UI
  document.querySelectorAll('.call-row').forEach((r, i) => r.classList.toggle('playing', i === index));
}

function togglePlay() {
  const player = document.getElementById('audio-player');
  if (player.paused) { player.play(); document.getElementById('np-play').innerHTML = '&#10074;&#10074;'; }
  else { player.pause(); document.getElementById('np-play').innerHTML = '&#9654;'; }
}

function playNext() {
  if (currentCallIndex < playQueue.length - 1) playCall(currentCallIndex + 1);
  else { document.getElementById('np-play').innerHTML = '&#9654;'; }
}
function playPrev() { if (currentCallIndex > 0) playCall(currentCallIndex - 1); }
function playAllTg() { if (playQueue.length > 0) playCall(0); }

function updateProgress() {
  const p = document.getElementById('audio-player');
  if (p.duration) {
    document.getElementById('np-bar').style.width = (p.currentTime / p.duration * 100) + '%';
  }
}

// --- Helpers ---
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function formatDuration(s) {
  if (s < 60) return Math.round(s) + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + Math.round(s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

// --- Auto refresh ---
refreshHome();
setInterval(() => { if (currentView === 'home') refreshHome(); }, 5000);
</script>
